<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSD1306 OLED 通用可视化工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            padding: 20px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 12px;
            border: 1px solid #333;
        }

        h1 {
            color: #00d4ff;
            font-size: 1.8em;
            margin-bottom: 10px;
        }

        .input-panel {
            background: #151515;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: auto auto 1fr auto;
            gap: 20px;
            align-items: start;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            color: #888;
            font-size: 0.9em;
            font-weight: 600;
        }

        .input-group input[type="number"] {
            width: 100px;
            background: #0a0a0a;
            border: 1px solid #333;
            color: #00d4ff;
            padding: 8px 12px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 1.1em;
        }

        .input-group textarea {
            background: #0a0a0a;
            border: 1px solid #333;
            color: #00d4ff;
            padding: 12px;
            border-radius: 6px;
            font-family: 'Consolas', monospace;
            font-size: 13px;
            min-width: 400px;
            min-height: 80px;
            resize: vertical;
        }

        .btn-primary {
            background: #00d4ff;
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            align-self: end;
        }

        .btn-primary:hover {
            background: #00b8e0;
            box-shadow: 0 0 20px rgba(0,212,255,0.4);
        }

        .error-msg {
            color: #ff4444;
            font-size: 0.9em;
            margin-top: 5px;
            display: none;
        }

        .info-tag {
            display: inline-block;
            background: rgba(0,212,255,0.1);
            color: #00d4ff;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.85em;
            margin-top: 5px;
            border: 1px solid rgba(0,212,255,0.3);
        }

        .main-grid {
            display: grid;
            grid-template-columns: 350px 1fr 400px;
            gap: 20px;
        }

        .panel {
            background: #151515;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            overflow: hidden;
        }

        .panel-title {
            color: #00d4ff;
            font-size: 1.1em;
            margin-bottom: 15px;
            font-weight: 600;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        button {
            background: #00d4ff;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        button.secondary {
            background: #333;
            color: #fff;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .hex-container {
            font-family: 'Consolas', monospace;
            font-size: 11px;
            max-height: 600px;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .page-section {
            margin-bottom: 15px;
            border: 1px solid #222;
            border-radius: 6px;
            overflow: hidden;
        }

        .page-header {

            font-size: 11px;
            color: #666;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
        }

        .hex-row {
            display: grid;
            gap: 1px;
            padding: 3px;
        }

        .addr-label {
            color: #444;
            font-size: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hex-cell {

            padding: 3px 1px;
            text-align: center;
            border-radius: 2px;
            font-size: 10px;
            border: 1px solid transparent;
            transition: all 0.2s;
            min-width: 20px;
        }

        .hex-cell.active {
            background: #00d4ff;
            color: #000;
            font-weight: bold;
            border-color: #00d4ff;

        .hex-cell.written {

            color: #00d4ff;

        }

            height: auto;

        .screen-labels {

            width: 100%;
            font-size: 12px;
            color: #666;

        .bit-map-visual {

            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;

        .bit-row {

            align-items: center;

            margin: 6px 0;
            font-family: monospace;
            font-size: 13px;
        }

        .bit-num {
            width: 40px;
            color: #666;
        }

        .bit-val {
            width: 30px;
            text-align: center;
            color: #00d4ff;
        }

        .pixel-bar {

            height: 20px;
            background: #222;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
        }

        .pixel-fill {
            height: 100%;
            background: #00d4ff;
            box-shadow: 0 0 10px #00d4ff;
        }

        .com-label {
            position: absolute;
            right: 5px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 10px;
            color: #000;
            font-weight: bold;
        }

        .dram-grid {
            display: grid;
            gap: 1px;
            margin-top: 10px;
        }

        .dram-cell {
            aspect-ratio: 1;
            background: #1a1a1a;
            border-radius: 1px;
            border: 1px solid #222;
            transition: all 0.2s;
        }

        .dram-cell.active {

            border-radius: 8px;

            padding: 3px 0;

        function loadPreset(name) {
            const p = presets[name];
            document.getElementById('inputWidth').value = p.width;
            document.getElementById('inputHeight').value = p.height;
            document.getElementById('inputData').value = p.data.map(b => '0x' + b.toString(16).padStart(2, '0')).join(',');
            updatePageInfo();
        }

        function updatePageInfo() {
            const h = parseInt(document.getElementById('inputHeight').value) || 24;
            const pages = h / 8;
            document.getElementById('pageInfo').textContent = `自动计算: ${pages} Pages`;
        }

        document.getElementById('inputHeight').addEventListener('input', updatePageInfo);
        document.getElementById('speedRange').addEventListener('input', (e) => {
            delay = parseInt(e.target.value);
            document.getElementById('speedVal').textContent = delay + 'ms';
        });

        function parseHexData(str) {
            // 移除所有非十六进制字符（保留0-9, a-f, A-F, x, X）
            // 支持格式: 0x00, 0xFF, 00, FF, 0X00 等
            const cleaned = str.replace(/[^0-9a-fA-FxX,]/g, '');
            
            // 分割成数组
            const parts = cleaned.split(',').filter(p => p.length > 0);
            
            const bytes = [];
            for (let part of parts) {
                part = part.trim();
                if (part.startsWith('0x') || part.startsWith('0X')) {
                    part = part.substring(2);
                }
                if (part.length > 0) {
                    const val = parseInt(part, 16);
                    if (!isNaN(val) && val >= 0 && val <= 255) {
                        bytes.push(val);
                    }
                }
            }
            return bytes;
        }

        function validateConfig() {
            const width = parseInt(document.getElementById('inputWidth').value);
            const height = parseInt(document.getElementById('inputHeight').value);
            const dataStr = document.getElementById('inputData').value;
            const errorEl = document.getElementById('errorMsg');
            
            if (width < 8 || width > 128) {
                errorEl.textContent = '宽度必须在 8-128 之间';
                errorEl.style.display = 'block';
                return false;
            }
            
            if (height % 8 !== 0) {
                errorEl.textContent = '高度必须是 8 的倍数 (8, 16, 24, 32...)';
                errorEl.style.display = 'block';
                return false;
            }
            
            const bytes = parseHexData(dataStr);
            const expected = width * (height / 8);
            
            if (bytes.length !== expected) {
                errorEl.textContent = `数据长度错误: 实际 ${bytes.length} 字节, 期望 ${expected} 字节 (${width}×${height/8})`;
                errorEl.style.display = 'block';
                return false;
            }
            
            errorEl.style.display = 'none';
            return { width, height, bytes };
        }

        function applyConfig() {
            const config = validateConfig();
            if (!config) return;
            
            COLS = config.width;
            ROWS = config.height;
            PAGES = ROWS / 8;
            imageData = config.bytes;
            
            // 更新Canvas尺寸（保持像素近似正方形）
            const maxCanvasWidth = 600;
            const pixelSize = Math.min(20, Math.floor(maxCanvasWidth / COLS));
            const canvasWidth = COLS * pixelSize;
            const canvasHeight = ROWS * pixelSize;
            
            canvas.width = canvasWidth;
            canvas.height = canvasHeight;
            
            document.getElementById('dataStats').textContent = `${imageData.length} bytes (${COLS}×${PAGES})`;
            document.getElementById('dramInfo').textContent = `${PAGES}页 × ${COLS}列 = ${imageData.length} Bytes`;
            document.getElementById('screenLabels').innerHTML = `
                <span>COL 0</span>
                <span style="color: #00d4ff;">↑ TOP (${ROWS}行)</span>
                <span>COL ${COLS-1}</span>
            `;
            
            init();
            resetAnimation();
        }

        function init() {
            // 创建十六进制视图
            const container = document.getElementById('hexContainer');
            container.innerHTML = '';
            
            for (let page = 0; page < PAGES; page++) {
                const section = document.createElement('div');
                section.className = 'page-section';
                
                const header = document.createElement('div');
                header.className = 'page-header';
                header.innerHTML = `<span>Page ${page} (行${page*8}-${page*8+7})</span><span>CMD: 0x${(0xB0+page).toString(16).toUpperCase()}</span>`;
                section.appendChild(header);
                
                const row = document.createElement('div');
                row.className = 'hex-row';
                row.style.gridTemplateColumns = `35px repeat(${COLS}, 1fr)`;
                
                const addrLabel = document.createElement('div');
                addrLabel.className = 'addr-label';
                addrLabel.textContent = `${page*COLS}`;
                row.appendChild(addrLabel);
                
                for (let col = 0; col < COLS; col++) {
                    const idx = page * COLS + col;
                    const cell = document.createElement('div');
                    cell.className = 'hex-cell';
                    cell.id = `hex-${idx}`;
                    cell.textContent = imageData[idx].toString(16).toUpperCase().padStart(2, '0');
                    cell.title = `Idx:${idx} P:${page} C:${col}`;
                    row.appendChild(cell);
                }
                section.appendChild(row);
                container.appendChild(section);
            }

            // 创建GDDRAM网格
            const dramGrid = document.getElementById('dramGrid');
            dramGrid.innerHTML = '';
            dramGrid.style.gridTemplateColumns = `repeat(${COLS}, 1fr)`;
            
            for (let page = 0; page < PAGES; page++) {
                for (let col = 0; col < COLS; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'dram-cell';
                    cell.id = `dram-${page}-${col}`;
                    cell.title = `Page ${page}, Col ${col}`;
                    dramGrid.appendChild(cell);
                }
                if (page < PAGES - 1) {
                    const divider = document.createElement('div');
                    divider.className = 'page-divider';
                    dramGrid.appendChild(divider);
                }
            }

            updateBitMapping(0);
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            drawGrid(pixelSize);
        }

        let pixelSize = 10;

        function drawGrid(ps) {
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 1;
            
            for (let i = 0; i <= COLS; i++) {
                ctx.beginPath();
                ctx.moveTo(i * ps, 0);
                ctx.lineTo(i * ps, canvas.height);
                ctx.stroke();
            }
            
            for (let i = 0; i <= ROWS; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * ps);
                ctx.lineTo(canvas.width, i * ps);
                ctx.stroke();
            }
            
            ctx.strokeStyle = '#444';
            ctx.lineWidth = 2;
            for (let i = 0; i <= PAGES; i++) {
                const y = i * 8 * ps;
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
        }

        function updateBitMapping(byte) {
            const container = document.getElementById('bitMapping');
            container.innerHTML = '';
            document.getElementById('currByteVal').textContent = `0x${byte.toString(16).toUpperCase().padStart(2, '0')}`;
            
            for (let bit = 7; bit >= 0; bit--) {
                const row = document.createElement('div');
                row.className = 'bit-row';
                
                const bitLabel = document.createElement('div');
                bitLabel.className = 'bit-num';
                bitLabel.textContent = `D${bit}`;
                
                const val = document.createElement('div');
                val.className = 'bit-val';
                const bitVal = (byte >> bit) & 1;
                val.textContent = bitVal;
                
                const barContainer = document.createElement('div');
                barContainer.className = 'pixel-bar';
                
                if (bitVal) {
                    const fill = document.createElement('div');
                    fill.className = 'pixel-fill';
                    fill.style.width = '100%';
                    barContainer.appendChild(fill);
                }
                
                const comLabel = document.createElement('div');
                comLabel.className = 'com-label';
                comLabel.textContent = `COM${bit}`;
                comLabel.style.color = bitVal ? '#000' : '#666';
                barContainer.appendChild(comLabel);
                
                row.appendChild(bitLabel);
                row.appendChild(val);
                row.appendChild(barContainer);
                container.appendChild(row);
            }
        }

        function drawScreen() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < currentIndex && i < imageData.length; i++) {
                const page = Math.floor(i / COLS);
                const col = i % COLS;
                const byte = imageData[i];
                
                for (let bit = 0; bit < 8; bit++) {
                    if ((byte >> bit) & 1) {
                        const row = page * 8 + bit;
                        ctx.fillStyle = '#00d4ff';
                        ctx.fillRect(col * pixelSize, row * pixelSize, pixelSize - 1, pixelSize - 1);
                    }
                }
            }
            
            if (currentIndex < imageData.length) {
                const page = Math.floor(currentIndex / COLS);
                const col = currentIndex % COLS;
                ctx.strokeStyle = '#ff9500';
                ctx.lineWidth = 2;
                ctx.strokeRect(col * pixelSize, page * 8 * pixelSize, pixelSize, 8 * pixelSize);
            }
            
            drawGrid(pixelSize);
        }

        function updateStatus(idx) {
            const page = Math.floor(idx / COLS);
            const col = idx % COLS;
            const byte = imageData[idx];
            
            document.getElementById('statPage').textContent = `${page} (0x${(0xB0+page).toString(16).toUpperCase()})`;
            document.getElementById('statCol').textContent = `${col} (0x${col.toString(16).padStart(2, '0')})`;
            document.getElementById('statAddr').textContent = idx;
            document.getElementById('statCmd').textContent = `Set Page 0x${(0xB0+page).toString(16).toUpperCase()}, Col 0x${col.toString(16).padStart(2, '0')}`;
            document.getElementById('statData').textContent = `0x${byte.toString(16).toUpperCase().padStart(2, '0')}`;
            
            document.querySelectorAll('.hex-cell').forEach((cell, i) => {
                cell.classList.remove('active');
                if (i < idx) cell.classList.add('written');
                if (i === idx) cell.classList.add('active');
            });
            
            document.querySelectorAll('.dram-cell').forEach(cell => {
                cell.classList.remove('active');
            });
            const dramCell = document.getElementById(`dram-${page}-${col}`);
            if (dramCell) {
                dramCell.classList.add('active');
                dramCell.classList.add('written');
            }
            
            updateBitMapping(byte);
            drawScreen();
        }

        async function animate() {
            while (isRunning && currentIndex < imageData.length) {
                if (isPaused) {
                    await new Promise(r => setTimeout(r, 50));
                    continue;
                }
                
                updateStatus(currentIndex);
                currentIndex++;
                await new Promise(r => setTimeout(r, delay));
            }
            
            if (currentIndex >= imageData.length) {
                isRunning = false;
                document.getElementById('btnStart').disabled = false;
                document.getElementById('btnPause').disabled = true;
                document.getElementById('statCmd').textContent = "Done - Display On (0xAF)";
            }
        }

        function startAnimation() {
            if (imageData.length === 0) {
                alert('请先应用配置');
                return;
            }
            if (isRunning) return;
            
            if (currentIndex >= imageData.length) {
                resetAnimation();
                setTimeout(() => {
                    isRunning = true;
                    document.getElementById('btnStart').disabled = true;
                    document.getElementById('btnPause').disabled = false;
                    animate();
                }, 100);
            } else {
                isRunning = true;
                document.getElementById('btnStart').disabled = true;
                document.getElementById('btnPause').disabled = false;
                animate();
            }
        }

        function pauseAnimation() {
            isPaused = !isPaused;
            document.getElementById('btnPause').textContent = isPaused ? '▶ 继续' : '⏸ 暂停';
        }

        function resetAnimation() {
            isRunning = false;
            isPaused = false;
            currentIndex = 0;
            
            document.querySelectorAll('.hex-cell').forEach(c => c.classList.remove('active', 'written'));
            document.querySelectorAll('.dram-cell').forEach(c => c.classList.remove('active', 'written'));
            
            document.getElementById('statPage').textContent = '-';
            document.getElementById('statCol').textContent = '-';
            document.getElementById('statAddr').textContent = '-';
            document.getElementById('statCmd').textContent = '-';
            document.getElementById('statData').textContent = '-';
            
            if (imageData.length > 0) {
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                drawGrid(pixelSize);
                updateBitMapping(0);
            }
            
            document.getElementById('btnStart').disabled = false;
            document.getElementById('btnPause').disabled = true;
            document.getElementById('btnPause').textContent = '⏸ 暂停';
        }

        // 初始化
        updatePageInfo();
        applyConfig();
    </script>
</body>
</html>
